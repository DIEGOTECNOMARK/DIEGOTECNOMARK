<head>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#0b1220;color:#fff}
header{background:#08101d;padding:20px;position:sticky;top:0}
.logo{font-size:32px;font-weight:bold;color:#3da5ff}

input{padding:10px;width:90%;max-width:500px}

<script>
function buscar(){
 let q=document.getElementById('buscar').value.toLowerCase();
 document.querySelectorAll('.card').forEach(c=>{
  c.style.display=c.innerText.toLowerCase().includes(q)?'block':'none';
 });
}
</script>
</head>
